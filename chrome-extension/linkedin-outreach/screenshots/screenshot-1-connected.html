<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Screenshot 1 - Connected View</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .chrome-frame {
      background: #2b2b3d;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
      width: 380px;
    }

    .chrome-titlebar {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #1e1e30;
      gap: 6px;
    }

    .chrome-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .chrome-dot.red { background: #ff5f56; }
    .chrome-dot.yellow { background: #ffbd2e; }
    .chrome-dot.green { background: #27c93f; }

    .chrome-title {
      margin-left: 8px;
      font-size: 11px;
      color: #888;
    }

    /* Extension popup styles */
    .popup {
      width: 100%;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
      padding: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .status-row {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.green {
      background: #2FCB72;
      box-shadow: 0 0 0 3px rgba(47,203,114,0.2);
    }

    .section { margin-bottom: 16px; }

    h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ccc;
    }

    .info-text {
      font-size: 12px;
      color: #888;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0A66C2, #0077B5);
      color: white;
    }

    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      line-height: 1.4;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid rgba(255,68,68,0.3);
      color: #FF6666;
    }

    .label-tag {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .wrapper {
      position: relative;
      padding-top: 40px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="label-tag">Extension Popup — Connected</div>
    <div class="chrome-frame">
      <div class="chrome-titlebar">
        <div class="chrome-dot red"></div>
        <div class="chrome-dot yellow"></div>
        <div class="chrome-dot green"></div>
        <div class="chrome-title">Traffic AI - LinkedIn Outreach</div>
      </div>
      <div class="popup">
        <div class="header">
          <div class="logo">Traffic AI</div>
          <div class="subtitle">LinkedIn Outreach</div>
        </div>

        <div class="status-row">
          <div class="status-item">
            <div class="status-dot green"></div>
            <span>LinkedIn</span>
          </div>
          <div class="status-item">
            <div class="status-dot green"></div>
            <span>Traffic AI</span>
          </div>
        </div>

        <div class="section">
          <h3>Last Run</h3>
          <div class="info-text">12 of 15 sent · 2h ago</div>
        </div>

        <div class="section">
          <button class="btn btn-primary">Send Now</button>
          <p class="hint">Process pending connection requests immediately.</p>
        </div>

        <div class="section">
          <button class="btn btn-danger">Disconnect</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
